name: Check external links

on:
  schedule:
    - cron: '17 3 1 * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check source links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --max-retries 3
            --accept 200,206,429
            './README.md'
            './src/**/*.{md,mdx,json,html}'
          fail: true
